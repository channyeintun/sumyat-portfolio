  <!-- ghost of body text below the rule -->
  <div style="position:absolute;left:48px;right:48px;bottom:9px;font-family:'Space Mono',monospace;font-size:9px;letter-spacing:0.24em;text-transform:uppercase;color:#b7c9d0">&sect; Curriculum Vitae &mdash; Working Dossier</div>
